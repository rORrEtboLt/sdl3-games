<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; font-src 'self' https://fonts.gstatic.com;">
<meta property="og:title" content="Maayavi — Dice Lane Defense">
<meta property="og:description" content="Roll dice, summon warriors from Indian mythology, defend against demons. Play free in your browser.">
<meta property="og:type" content="website">
<title>Maayavi — Dice Lane Defense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1F182F;touch-action:none}
body{display:flex;justify-content:center;align-items:center;flex-direction:column;font-family:'DM Sans',sans-serif}
canvas#canvas{display:block;max-width:100vw;max-height:100vh;object-fit:contain;touch-action:none}
#loading{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;color:#E5AE3A;font-family:'Teko',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:0.1em;background:#1F182F;z-index:10;transition:opacity .4s}
#loading.hidden{opacity:0;pointer-events:none}
#onboarding{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:rgba(31,24,47,0.85);z-index:20;cursor:pointer;display:none}
#onboarding-box{background:#2A3048;border:2px solid #406287;padding:28px 24px;max-width:320px;text-align:center;color:#E2E8D6}
#onboarding-box h2{margin-bottom:12px;font-family:'Teko',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:0.08em;color:#E5AE3A}
#onboarding-box p{font-size:0.9rem;line-height:1.5;margin-bottom:8px;color:#A09CAA}
#onboarding-box .dismiss{margin-top:12px;font-size:0.75rem;color:#75718F}
#challenge-overlay{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:rgba(31,24,47,0.85);z-index:25;display:none;cursor:pointer}
#challenge-box{background:#2A3048;border:2px solid #E5AE3A;padding:24px;max-width:300px;text-align:center;color:#E5AE3A;font-family:'Teko',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:0.05em}
#share-feedback{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#5A9E6F;color:#E2E8D6;padding:8px 20px;font-size:0.9rem;z-index:30;display:none}
#share-fallback{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#2A3048;border:1px solid #406287;padding:12px;z-index:30;display:none;text-align:center}
#share-fallback label{display:block;color:#E2E8D6;font-size:0.8rem;margin-bottom:6px}
#share-fallback-input{width:260px;padding:6px;background:#1F182F;border:1px solid #406287;color:#E5AE3A;font-size:0.8rem}
</style>
</head>
<body>
<div id="loading">Loading Maayavi...</div>

<div id="onboarding" onclick="dismissOnboarding()">
<div id="onboarding-box" onclick="event.stopPropagation()">
<h2>How to Play</h2>
<p>Drag dice from the tray onto the battlefield to summon warriors.</p>
<p>Each dice face summons a different unit type.</p>
<p>Stop the demons before they reach your base!</p>
<p class="dismiss">Tap anywhere to start</p>
</div>
</div>

<div id="challenge-overlay" onclick="dismissChallenge()">
<div id="challenge-box" onclick="event.stopPropagation()">
<span id="challenge-text"></span>
</div>
</div>

<div id="share-feedback"></div>
<div id="share-fallback">
<label>Copy this link:</label>
<input id="share-fallback-input" type="text" readonly onclick="this.select()">
</div>

<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

<script>
(function() {
    var challengeScore = null;
    var params = new URLSearchParams(window.location.search);
    var scoreParam = params.get('score');
    if (scoreParam !== null) {
        var parsed = parseInt(scoreParam, 10);
        if (!isNaN(parsed) && parsed >= 0 && parsed <= 999999) {
            challengeScore = parsed;
        }
        try { history.replaceState(null, '', window.location.pathname); } catch(e) {}
    }

    function showOnboarding() {
        if (sessionStorage.getItem('maayavi-onboarded')) return;
        var el = document.getElementById('onboarding');
        if (el) el.style.display = 'flex';
        sessionStorage.setItem('maayavi-onboarded', '1');
    }

    window.dismissOnboarding = function() {
        var el = document.getElementById('onboarding');
        if (el) el.style.display = 'none';
    };

    function showChallenge() {
        if (challengeScore === null) return;
        var el = document.getElementById('challenge-overlay');
        var txt = document.getElementById('challenge-text');
        if (el && txt) {
            txt.textContent = 'Your friend scored ' + challengeScore + ' — can you beat them?';
            el.style.display = 'flex';
            setTimeout(dismissChallenge, 3000);
        }
    }

    window.dismissChallenge = function() {
        var el = document.getElementById('challenge-overlay');
        if (el) el.style.display = 'none';
    };

    var Module = window.Module = {
        canvas: document.getElementById('canvas'),
        onRuntimeInitialized: function() {
            document.getElementById('loading').classList.add('hidden');
            requestAnimationFrame(function() {
                if (challengeScore !== null) {
                    showChallenge();
                } else {
                    showOnboarding();
                }
            });
        }
    };
})();
</script>
{{{ SCRIPT }}}
</body>
</html>
